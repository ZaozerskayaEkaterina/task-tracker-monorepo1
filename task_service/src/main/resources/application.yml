# настройки сервера
server:
  port: 8082                     # таск сервис будет слушать порт 8082

spring:
  application:
    name: task-service           # имя приложения, используется при регистрации и для swagger

  # настройки подключения к базе данных
  datasource:
    url: jdbc:h2:mem:taskdb      # h2 база в памяти, называется taskdb (отдельная от userdb)
    driver-class-name: org.h2.Driver
    username: sa                 # стандартный юзер для h2
    password:                    # пароль пустой

  # настройки jpa и hibernate
  jpa:
    hibernate:
      ddl-auto: none             # отключаем автосоздание таблиц, используем ликвидбейз
    show-sql: true               # выводить sql запросы в лог

  # h2 консоль для просмотра таблиц и данных
  h2:
    console:
      enabled: true

  # настройки миграций ликвидбейз
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml   # путь к файлу с изменениями